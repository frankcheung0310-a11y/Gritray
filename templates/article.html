<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Gritray</title>
    <style>
        :root {
            --bg: #f7f3f0; /* Pi.ai warm cream background */
            --text-main: #1a1a1a;
            --text-muted: #6b6661;
            --accent: #000000;
            --border: #e8e2dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: "Ivar", "Georgia", serif;
            line-height: 1.8;
            padding: 8vh 1.5rem;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        article {
            max-width: 680px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav {
            margin-bottom: 5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        header {
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .meta {
            font-family: -apple-system, sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Content Styling - This handles the Markdown output */
        .content {
            font-size: 1.25rem;
            text-align: left;
            hyphens: auto;
            word-break: break-word;
        }

        .content p {
            margin-bottom: 2rem;
        }

        .content h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin: 3rem 0 1.5rem 0;
            color: var(--accent);
        }

        .content strong {
            font-weight: 600;
            color: var(--accent);
        }

        .content em {
            color: var(--text-muted);
        }

        .content blockquote {
            border-left: 2px solid var(--border);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--text-muted);
        }

        /* Footer and contact */
        footer {
            margin-top: 8rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-family: -apple-system, sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.05em;
        }

        footer a {
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid #d4cfc7;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; line-height: 1.1; }
            .content { font-size: 1.15rem; line-height: 1.7; }
        }
    </style>
</head>
<body>

    <article>
        <nav><a href="../index.html">← Gritray Index</a></nav>
        
        <header>
            <h1>{{TITLE}}</h1>
            <div class="meta">Physical Intelligence Research • Gritray Lab</div>
        </header>

        <section class="content">
            {{CONTENT}}
        </section>

        <footer>
            <p>&copy; 2026 Gritray. All rights reserved.</p>
            <p>Direct inquiries to <a href="mailto:Frank@X-Qubit.com">Frank@X-Qubit.com</a></p>
        </footer>
    </article>

</body>
</html>
