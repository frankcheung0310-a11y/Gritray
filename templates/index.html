<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gritray | Perception Layer for Physical Intelligence</title>
    <style>
        :root {
            --bg: #faf8f5; /* Pi 经典的奶油色背景 */
            --text: #1a1a1a;
            --secondary: #8c857d;
            --accent: #000000;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif; /* 使用衬线体增加学术美感 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            font-family: 'Helvetica Neue', sans-serif;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }
        .description {
            font-size: 1.25rem;
            line-height: 1.7;
            color: var(--secondary);
            margin-bottom: 4rem;
        }
        .nav-links {
            list-style: none;
            padding: 0;
            text-align: left;
            display: inline-block;
        }
        .nav-links li {
            margin: 1.5rem 0;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 1.2rem;
            border-bottom: 1px solid #d4cfc7;
            transition: all 0.3s;
        }
        .nav-links a:hover {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Gritray.com</div>
        <h1>Intelligence becomes real when the world stops being frictionless.</h1>
        <p class="description">探索物理规律作为 AI 世界模型的底层语法。这里是关于 Fricial Intelligence 的思考阵地。</p>
        
        <ul class="nav-links">
            <li><a href="articles/physics-as-grammar.html">01. 摩擦力：世界模型缺失的语法</a></li>
            </ul>
    </div>
</body>
</html>
