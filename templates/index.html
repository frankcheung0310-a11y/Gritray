<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Gritray | Perception for Physical Intelligence</title>
    <style>
        :root {
            --bg: #f7f3f0;
            --text-main: #1a1a1a;
            --text-muted: #6b6661;
            --border: #e8e2dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: "Ivar", "Georgia", serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            width: 100%;
            padding: 12vh 2rem;
        }

        .brand {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 2.5rem;
            letter-spacing: -0.01em;
        }

        .summary {
            font-size: 1.4rem;
            color: var(--text-muted);
            margin-bottom: 5rem;
        }

        .feed {
            border-top: 1px solid var(--border);
        }

        /* Styles for the automatically generated links */
        .post-entry {
            display: block;
            padding: 2.5rem 0;
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s ease;
        }

        .post-entry:hover {
            opacity: 0.5;
        }

        .post-title {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 400;
        }

        footer {
            margin-top: 8rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.8;
        }

        footer a {
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid #d4cfc7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">Gritray</div>
            <h1>Intelligence is the negotiation with physical resistance.</h1>
            <p class="summary">Defining the Fricial Protocol: A semantic framework for World Models and Embodied AI.</p>
        </header>

        <main class="feed">
            {{POST_FEED}}
        </main>

        <footer>
            <p>&copy; 2026 Gritray Lab. Dedicated to Physical Truth.</p>
            <p>Inquiries: <a href="mailto:Frank@X-Qubit.com">Frank@X-Qubit.com</a></p>
        </footer>
    </div>

</body>
</html>
